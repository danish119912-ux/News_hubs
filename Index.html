<div id="news-container">Khabrein load ho rahi hain...</div>

<script>
    const API_KEY = 'YOUR_NEWS_API_KEY'; // Yahan apni NewsAPI.org wali key dalein
    fetch(`https://newsapi.org/v2/top-headlines?country=in&apiKey=${API_KEY}`)
        .then(res => res.json())
        .then(data => {
            let html = '';
            data.articles.forEach(article => {
                html += `<div><h3>${article.title}</h3><p>${article.description}</p></div><hr>`;
            });
            document.getElementById('news-container').innerHTML = html;
        });
</script>
