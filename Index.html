<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsHub | Taaza Khabrein</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .news-card { transition: transform 0.2s; }
        .news-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">NewsHub</h1>
            <nav>
                <ul class="flex space-x-4 text-sm">
                    <li><a href="#" class="hover:underline">Home</a></li>
                    <li><a href="#" class="hover:underline">India</a></li>
                    <li><a href="#" class="hover:underline">Business</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container mx-auto mt-6 px-4">
        
        <div id="top-ad" class="w-full h-24 bg-gray-200 mb-6 flex items-center justify-center border-dashed border-2 border-gray-400">
            <span class="text-gray-500 text-xs text-center">[Yahan apna Adsterra/Adsense code dalein]</span>
        </div>

        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-10">
                <p class="text-xl font-semibold">Khabrein load ho rahi hain...</p>
            </div>
        </div>

    </main>

    <script>
        const API_KEY = '09abd130ee8f40709825e02c10820d92'; // Yahan apni API Key dalein
        const NEWS_URL = `https://newsapi.org/v2/top-headlines?country=in&apiKey=${API_KEY}`;

        async function fetchNews() {
            try {
                const response = await fetch(NEWS_URL);
                const data = await response.json();
                displayNews(data.articles);
            } catch (error) {
                console.error("Error fetching news:", error);
                document.getElementById('news-container').innerHTML = "<p class='text-red-500'>Khabrein load nahi ho sakin. API Key check karein.</p>";
            }
        }

        function displayNews(articles) {
            const container = document.getElementById('news-container');
            container.innerHTML = '';

            articles.forEach(article => {
                if(!article.urlToImage) return; // Bina photo wali news skip karein

                const card = `
                    <div class="news-card bg-white rounded-lg shadow-md overflow-hidden flex flex-col">
                        <img src="${article.urlToImage}" class="w-full h-48 object-cover" alt="news">
                        <div class="p-4 flex-grow">
                            <h2 class="font-bold text-lg mb-2">${article.title}</h2>
                            <p class="text-gray-600 text-sm mb-4">${article.description ? article.description.substring(0, 100) : ''}...</p>
                            <a href="${article.url}" target="_blank" class="text-blue-600 font-semibold hover:text-blue-800">Puri Khabar Padhein &rarr;</a>
                        </div>
                        <div class="p-4 bg-gray-50 border-t">
                            <a href="YOUR_CPA_LINK" class="block text-center bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700">Trending Offer Dekhein</a>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        fetchNews();
    </script>

</body>
</html>
