<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsHub | Taaza Khabrein</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .news-card:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-indigo-700 text-white shadow-lg p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic">NEWS HUB</h1>
            <span class="bg-red-500 text-[10px] px-2 py-1 rounded animate-pulse">LIVE UPDATE</span>
        </div>
    </header>

    <main class="container mx-auto mt-6 px-4 pb-20">
        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20 text-gray-500">
                <p class="text-lg font-medium">Khabrein aa rahi hain...</p>
            </div>
        </div>
    </main>

    <script>
        // Aapki API Key jo screenshot mein thi
        const API_KEY = '911e44a2f2ba67cfa0abad78f092bf57'; 
        const GNEWS_URL = `https://gnews.io/api/v4/top-headlines?category=general&lang=en&country=in&max=10&apikey=${API_KEY}`;

        async function fetchTrendingNews() {
            try {
                const response = await fetch(GNEWS_URL);
                const data = await response.json();
                
                const container = document.getElementById('news-container');
                container.innerHTML = ''; 

                if (data.articles) {
                    data.articles.forEach(article => {
                        const card = `
                            <div class="news-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                                <img src="${article.image}" class="w-full h-52 object-cover" alt="news-img">
                                <div class="p-5 flex-grow">
                                    <h2 class="font-bold text-xl text-gray-800 mb-3 leading-snug">${article.title}</h2>
                                    <p class="text-gray-600 text-sm mb-6">${article.description.substring(0, 120)}...</p>
                                    
                                    <a href="YAHAN_APNA_CPA_LINK_DALEIN" class="block text-center bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-md hover:bg-indigo-800 transition-all mb-4">
                                        Puri Khabar Padhein
                                    </a>

                                    <div class="flex justify-between items-center text-[10px] text-gray-400 uppercase tracking-widest font-bold">
                                        <span>${article.source.name}</span>
                                        <a href="${article.url}" target="_blank" class="hover:text-indigo-600 italic">Original Source</a>
                                    </div>
                                </div>
                            </div>
                        `;
                        container.innerHTML += card;
                    });
                } else {
                    container.innerHTML = "<p class='text-center col-span-full'>Data nahi mila. Key limit check karein.</p>";
                }
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('news-container').innerHTML = "<p class='text-center text-red-500 col-span-full'>Connection Error!</p>";
            }
        }

        fetchTrendingNews();
    </script>
</body>
</html>
