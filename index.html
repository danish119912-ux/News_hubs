<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsHub Pro | Fast & Own Content</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .detail-view { display: none; }
        .active { display: block; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-indigo-700 text-white shadow-lg p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic cursor-pointer" onclick="showListView()">NEWS HUB</h1>
            <span class="bg-green-500 text-[10px] px-2 py-1 rounded">ULTRA FAST</span>
        </div>
    </header>

    <main class="container mx-auto mt-6 px-4 pb-20">
        <div id="news-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="col-span-full text-center py-20">Khabrein load ho rahi hain...</p>
        </div>

        <div id="news-detail" class="detail-view max-w-3xl mx-auto bg-white p-6 rounded-2xl shadow-xl">
            <button onclick="showListView()" class="mb-6 text-indigo-600 font-bold flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Wapas Jayein
            </button>
            <div id="detail-content"></div>
        </div>
    </main>

    <script>
        // AAPKI SARI APIs EK SATH
        const API_KEYS = {
            gnews: '911e44a2f2ba67cfa0abad78f092bf57',
            apitube: 'api_live_9DYPWaYzfeMEwxsdOF801WbblYWsMexmjBKYKspkwi5OrQTHX2yigRWBIV',
            currents: 'bTmGIpDjYOl4yrvpYttmd6ImjzyUgB_cbg8XEubxuLsE-nAh',
            hasdata: '111783b0-5a1a-43a1-9a97-7746cb378516'
        };
        const NATIVE_AD_ID = '29000696';
        let allArticles = [];

        async function fetchNews() {
            // Priority 1: GNews (Best for Hindi/India)
            const url = `https://gnews.io/api/v4/top-headlines?category=general&lang=hi&country=in&max=12&apikey=${API_KEYS.gnews}`;
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            
            try {
                const res = await fetch(proxy);
                const raw = await res.json();
                const data = JSON.parse(raw.contents);
                allArticles = data.articles;
                renderList();
            } catch (e) {
                console.log("Switching to Backup API...");
                // Agar GNews fail ho, toh backup logic yahan add kar sakte hain
                document.getElementById('news-list').innerHTML = "<p class='text-center col-span-full'>API Limit Reach. Refreshing...</p>";
            }
        }

        function renderList() {
            const list = document.getElementById('news-list');
            list.innerHTML = '';
            
            allArticles.forEach((article, index) => {
                list.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col hover:shadow-md transition-all">
                        <img src="${article.image || 'https://via.placeholder.com/400x200?text=News'}" class="w-full h-48 object-cover">
                        <div class="p-5 flex-grow">
                            <h2 class="font-bold text-lg mb-4 text-gray-800 leading-tight">${article.title}</h2>
                            <button onclick="showDetail(${index})" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-indigo-200 shadow-lg">
                                Puri Khabar Padhein
                            </button>
                        </div>
                    </div>`;
                
                // Ads after every 3 articles for better speed
                if ((index + 1) % 3 === 0) {
                    list.innerHTML += `
                        <div class="bg-indigo-50 border-2 border-dashed border-indigo-200 rounded-2xl p-4 flex flex-col items-center justify-center">
                            <span class="text-[10px] font-bold text-indigo-400 mb-2">SPONSORED AD</span>
                            <div class="py-10 text-center">
                                <p class="text-xs text-indigo-300">Native ID: ${NATIVE_AD_ID}</p>
                                <p class="font-bold text-indigo-600 text-sm">Best CPA Offers for You</p>
                            </div>
                        </div>`;
                }
            });
        }

        function showDetail(index) {
            const article = allArticles[index];
            document.getElementById('news-list').style.display = 'none';
            document.getElementById('news-detail').classList.add('active');
            
            document.getElementById('detail-content').innerHTML = `
                <img src="${article.image}" class="w-full rounded-2xl mb-6 shadow-lg">
                <h1 class="text-3xl font-extrabold text-gray-900 mb-4 leading-tight">${article.title}</h1>
                <p class="text-gray-700 text-lg leading-relaxed mb-8">${article.description || 'Content loading...'}</p>
                
                <div class="bg-yellow-100 p-8 rounded-2xl text-center border-2 border-yellow-400">
                    <h3 class="font-black text-xl mb-2 text-yellow-800">SPECIAL OFFER</h3>
                    <p class="mb-6 text-yellow-700">Is khabar ke bare mein aur janne ke liye niche click karein.</p>
                    <a href="APNA_CPA_LINK_YAHAN" class="inline-block bg-indigo-700 text-white px-10 py-4 rounded-full font-black text-lg shadow-xl hover:bg-black transition">
                        CONTINUE TO READ
                    </a>
                </div>
            `;
            window.scrollTo(0, 0);
        }

        function showListView() {
            document.getElementById('news-list').style.display = 'grid';
            document.getElementById('news-detail').classList.remove('active');
        }

        fetchNews();
    </script>
</body>
</html>
