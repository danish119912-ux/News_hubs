<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsHub | Your Own Content</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-indigo-700 text-white shadow-lg p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic cursor-pointer" onclick="showListView()">NEWS HUB</h1>
            <span class="bg-red-500 text-[10px] px-2 py-1 rounded animate-pulse">LIVE</span>
        </div>
    </header>

    <main class="container mx-auto mt-6 px-4 pb-20">
        <div id="news-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="col-span-full text-center py-20">Khabrein load ho rahi hain...</p>
        </div>

        <div id="news-detail" class="hidden max-w-3xl mx-auto bg-white p-6 rounded-2xl shadow-lg">
            <button onclick="showListView()" class="mb-4 text-indigo-600 font-bold">← Wapas Jayein</button>
            <div id="detail-content"></div>
        </div>
    </main>

    <script>
        const API_KEY = '911e44a2f2ba67cfa0abad78f092bf57';
        const NATIVE_AD_ID = '29000696';
        let allArticles = [];

        async function fetchNews() {
            const ACTUAL_URL = `https://gnews.io/api/v4/top-headlines?category=general&lang=hi&country=in&max=10&apikey=${API_KEY}`;
            const PROXY_URL = `https://api.allorigins.win/get?url=${encodeURIComponent(ACTUAL_URL)}`;
            
            try {
                const res = await fetch(PROXY_URL);
                const raw = await res.json();
                const data = JSON.parse(raw.contents);
                allArticles = data.articles;
                renderList();
            } catch (e) { console.log(e); }
        }

        function renderList() {
            const list = document.getElementById('news-list');
            list.innerHTML = '';
            allArticles.forEach((article, index) => {
                list.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden flex flex-col">
                        <img src="${article.image}" class="w-full h-48 object-cover">
                        <div class="p-5 flex-grow">
                            <h2 class="font-bold text-lg mb-3">${article.title}</h2>
                            <button onclick="showDetail(${index})" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl">
                                Puri Khabar Padhein
                            </button>
                        </div>
                    </div>`;
                
                // Ads after every 2nd news
                if ((index + 1) % 2 === 0) {
                    list.innerHTML += `
                        <div class="bg-yellow-50 border-2 border-dashed rounded-2xl p-4 text-center">
                            <span class="text-xs font-bold text-yellow-600">ADVERTISEMENT</span>
                            <p class="py-10 text-gray-400">Native Ad ID: ${NATIVE_AD_ID}</p>
                        </div>`;
                }
            });
        }

        function showDetail(index) {
            const article = allArticles[index];
            document.getElementById('news-list').classList.add('hidden');
            document.getElementById('news-detail').classList.remove('hidden');
            
            document.getElementById('detail-content').innerHTML = `
                <img src="${article.image}" class="w-full rounded-xl mb-6">
                <h1 class="text-3xl font-bold mb-4">${article.title}</h1>
                <p class="text-gray-700 leading-relaxed text-lg mb-6">${article.content || article.description}</p>
                <div class="bg-gray-100 p-6 rounded-xl text-center mb-6">
                    <p class="text-sm font-bold text-gray-500 mb-2">SPONSORED OFFER</p>
                    <a href="APNA_CPA_LINK_YAHAN" class="inline-block bg-green-500 text-white px-8 py-3 rounded-full font-bold">CLICK HERE TO JOIN</a>
                </div>
            `;
            window.scrollTo(0, 0);
        }

        function showListView() {
            document.getElementById('news-list').classList.remove('hidden');
            document.getElementById('news-detail').classList.add('hidden');
        }

        fetchNews();
    </script>
</body>
</html>
