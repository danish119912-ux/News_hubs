<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsHub | Fast News</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <header class="bg-indigo-700 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic cursor-pointer" onclick="showListView()">NEWS HUB</h1>
            <span class="bg-green-500 text-[10px] px-2 py-1 rounded animate-pulse tracking-tighter uppercase">Ultra Fast</span>
        </div>
    </header>

    <main class="container mx-auto mt-6 px-4 pb-20">
        <div id="news-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="col-span-full text-center py-20">Khabrein load ho rahi hain...</p>
        </div>

        <div id="news-detail" class="hidden max-w-3xl mx-auto bg-white p-6 rounded-2xl shadow-xl">
            <button onclick="showListView()" class="mb-6 text-indigo-600 font-bold">← Back to News</button>
            <div id="detail-content"></div>
        </div>
    </main>

    <script>
        const NATIVE_AD_ID = '29000696';
        let allArticles = [];

        async function loadNews() {
            try {
                // Inshorts API (No Key Needed)
                const res = await fetch("https://inshortsapi.vercel.app/news?category=all");
                const result = await res.json();
                if(result.success) {
                    allArticles = result.data;
                    renderList();
                }
            } catch (e) {
                document.getElementById('news-list').innerHTML = "Refresh again to load news.";
            }
        }

        function renderList() {
            const list = document.getElementById('news-list');
            list.innerHTML = '';
            allArticles.forEach((article, index) => {
                list.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden flex flex-col hover:shadow-lg transition">
                        <img src="${article.imageUrl}" class="w-full h-48 object-cover">
                        <div class="p-5 flex-grow">
                            <h2 class="font-bold text-lg mb-4 leading-tight">${article.title}</h2>
                            <button onclick="showDetail(${index})" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl">Puri Khabar Padhein</button>
                        </div>
                    </div>`;
                if ((index + 1) % 3 === 0) {
                    list.innerHTML += `
                        <div class="bg-indigo-50 border-2 border-dashed rounded-2xl p-4 flex flex-col items-center justify-center">
                            <span class="text-[10px] font-bold text-indigo-400 mb-2 underline tracking-widest">ADVERTISEMENT</span>
                            <p class="text-xs text-indigo-600 font-bold">Ad Slot ID: ${NATIVE_AD_ID}</p>
                        </div>`;
                }
            });
        }

        function showDetail(index) {
            const article = allArticles[index];
            document.getElementById('news-list').classList.add('hidden');
            document.getElementById('news-detail').classList.remove('hidden');
            document.getElementById('detail-content').innerHTML = `
                <img src="${article.imageUrl}" class="w-full rounded-2xl mb-6 shadow-md">
                <h1 class="text-2xl font-extrabold mb-4 text-gray-900">${article.title}</h1>
                <p class="text-gray-700 text-lg leading-relaxed mb-8">${article.content}</p>
                <div class="bg-yellow-100 p-6 rounded-2xl text-center border-2 border-yellow-400">
                    <p class="font-bold text-yellow-800 mb-4 uppercase text-xs">Special Sponsored Offer</p>
                    <a href="APNA_CPA_LINK_YAHAN" class="inline-block bg-black text-white px-10 py-4 rounded-full font-black shadow-lg">CONTINUE READING</a>
                </div>`;
            window.scrollTo(0, 0);
        }

        function showListView() {
            document.getElementById('news-list').classList.remove('hidden');
            document.getElementById('news-detail').classList.add('hidden');
        }

        loadNews();
    </script>
</body>
</html>
